[build]
  publish = "frontend"

# Backend proxy (Railway)
[[redirects]]
  from = "/api/*"
  to = "https://reactiva-backend.up.railway.app/api/:splat"
  status = 200
  force = true

# Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"