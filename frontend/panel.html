<!-- PANEL.HTML COMPLETO -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
/* ================= CONFIG ================= */
const API_URL = "http://localhost:5000/api"; // Cambia en producción
const CLINIC_ID = 1; // ID de la clínica actual

/* ================= SOCKET ================= */
const socket = io("http://localhost:5000");

// Unirse a la "sala" de la clínica
socket.emit("joinClinic", CLINIC_ID);

let currentLeadId = null;

socket.on("nuevo_mensaje", (msg) => {
  console.log("LIVE:", msg);

  if (currentLeadId === msg.leadId) {
    addLiveMessage(msg);
  }

  loadLeads(); // refresca leads en tiempo real
});

/* ================= API ================= */
async function api(path, method="GET", body=null){
  const res = await fetch(API_URL + path, {
    method,
    headers: {"Content-Type":"application/json"},
    body: body ? JSON.stringify(body) : null
  });
  return res.json();
}

/* ================= ESTADO ================= */
let cfg = null;
let respDB = [];
let citas = [];
let allLeads = [];

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", async () => {
  await loadAll();
  applyGlobalCfg();
  renderRespuestas();
  initChat();
});

async function loadAll(){
  try {
    cfg = await api("/bot/config");
    respDB = await api("/bot/respuestas");
    citas = await api("/citas");
    allLeads = await api("/leads");
  } catch(e){
    console.warn("Modo local activado");
    cfg = JSON.parse(localStorage.getItem("ra_cfg")||"null") || {bot:"Bot",clinica:"Clínica"};
    respDB = JSON.parse(localStorage.getItem("ra_respuestas")||"[]");
    citas = JSON.parse(localStorage.getItem("ra_citas")||"[]");
    allLeads = JSON.parse(localStorage.getItem("ra_leads")||"[]");
  }
}

/* ================= CONFIG ================= */
async function guardarCfg(){
  try { await api("/bot/config","PUT",cfg); }
  catch{ localStorage.setItem("ra_cfg", JSON.stringify(cfg)); }
}

/* ================= RESPUESTAS ================= */
async function addRespuesta(trigger,respuesta,categoria){
  const data = {trigger,respuesta,categoria};
  try { await api("/bot/respuestas","POST",data); }
  catch{ respDB.push({...data,id:Date.now()}); localStorage.setItem("ra_respuestas",JSON.stringify(respDB)); }
  renderRespuestas();
}

function renderRespuestas(){
  const list = document.getElementById("respuestasList");
  if(!list) return;
  list.innerHTML = respDB.map(r=>`
    <div class="resp-card">
      <div><b>Trigger:</b> ${r.trigger}</div>
      <div><b>Respuesta:</b> ${r.respuesta}</div>
    </div>
  `).join("");
}

/* ================= CHAT ================= */
async function enviarMensaje(){
  const input = document.getElementById("chatInput");
  const texto = input.value;
  input.value="";

  addUserMsg(texto);

  let respuesta;
  try {
    respuesta = await api("/bot/mensaje","POST",{
      texto: texto,
      lead_id: currentLeadId,
      canal: "web"
    });
  } catch{
    respuesta = getLocalResponse(texto);
  }

  addBotMsg(respuesta.texto || respuesta.reply?.texto, respuesta.quickReplies || []);
}

function getLocalResponse(texto){
  const match = respDB.find(r=> texto.toLowerCase().includes(r.trigger));
  if(match) return {texto: match.respuesta};
  return {texto: "No entendí, ¿puedes repetir?"};
}

/* ================= CITAS ================= */
async function registrarCita(cita){
  try { await api("/citas","POST",cita); }
  catch{ citas.push(cita); localStorage.setItem("ra_citas",JSON.stringify(citas)); }
}

/* ================= LEADS ================= */
async function addLead(lead){
  try { await api("/leads","POST",lead); }
  catch{ allLeads.push(lead); localStorage.setItem("ra_leads",JSON.stringify(allLeads)); }
}

async function loadLeads(){
  allLeads = await api("/leads");
  console.log("Leads:", allLeads);
}

/* ================= UI CHAT ================= */
function addUserMsg(t){
  const d=document.createElement("div");
  d.className="msg user";
  d.innerHTML=`<div class="msg-bubble">${t}</div>`;
  document.getElementById("chatMessages").appendChild(d);
}

function addBotMsg(t, quickReplies=[]){
  const d=document.createElement("div");
  d.className="msg bot";
  d.innerHTML=`<div class="msg-bubble">${t}</div>`;
  document.getElementById("chatMessages").appendChild(d);

  if(quickReplies.length){
    const qrDiv = document.createElement("div");
    qrDiv.className="quickReplies";
    qrDiv.innerHTML = quickReplies.map(q=>`<button onclick="enviarMensajeConTexto('${q}')">${q}</button>`).join(" ");
    document.getElementById("chatMessages").appendChild(qrDiv);
  }
}

function addLiveMessage(msg){
  const chat = document.getElementById("chatMessages");
  const div = document.createElement("div");
  div.className = "msg " + (msg.from === "user" ? "user" : "bot");
  div.innerHTML = `<div class="msg-bubble">${msg.text}</div>`;
  chat.appendChild(div);
}

function enviarMensajeConTexto(t){
  document.getElementById("chatInput").value = t;
  enviarMensaje();
}

function initChat(){
  addBotMsg(`Hola, soy ${cfg.bot || "Bot"} de ${cfg.clinica || "Clínica"}`);
}

/* ================= APLICAR CONFIG ================= */
function applyGlobalCfg(){
  if(!cfg) return;
  document.getElementById("clinicaName")?.innerText = cfg.clinica || "Clínica";
}
</script>
