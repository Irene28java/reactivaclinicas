# ══════════════════════════════════════════════
# netlify.toml — Configuración de deploy Netlify
# Coloca este archivo en la raíz del proyecto
# ══════════════════════════════════════════════

[build]
  # El directorio donde están tus archivos HTML/JS/CSS
  publish = "reactivaclinicas"

# Redirige llamadas a tu backend en Railway
[[redirects]]
  from = "/api/*"
  to = "https://reactiva-backend.up.railway.app/:splat"
  status = 200
  force = false

# Cabeceras de seguridad
[[headers]]
  for = "/*"
  [headers.values]
  X-Frame-Options = "DENY"
  X-XSS-Protection = "1; mode=block"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Strict-Transport-Security = "max-age=31536000; includeSubDomains"