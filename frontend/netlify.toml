# ══════════════════════════════════════════════
#  netlify.toml — Configuración de deploy Netlify
#  Coloca este archivo en la raíz del frontend
# ══════════════════════════════════════════════

[build]
  publish = "."

# Redirige todas las rutas al index por si añades un router en el futuro
[[redirects]]
  from = "/api/*"
  to = "https://reactiva-backend.up.railway.app/api/:splat"
  status = 200
  force = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"